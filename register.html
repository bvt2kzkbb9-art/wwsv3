<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejestracja - Weekend Warrior V5</title>
  <link rel="stylesheet" href="css/premium.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-container { max-width: 400px; width: 100%; background: linear-gradient(135deg, rgba(31,29,26,0.95) 0%, rgba(21,18,16,0.9) 100%); border: 2px solid var(--gold); border-radius: 12px; padding: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600; }
    .form-group input { width: 100%; padding: 0.75rem; background: var(--bg-input); border: 1px solid var(--border-light); border-radius: 6px; color: var(--text-primary); }
    .btn-primary { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
    .error { color: #EF4444; font-size: 0.85rem; margin-top: 0.5rem; }
    .link { text-align: center; margin-top: 1.5rem; }
    .link a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1 style="text-align: center; color: var(--gold); margin-bottom: 2rem;">⚔ Rejestracja</h1>
    
    <form id="register-form">
      <div class="form-group">
        <label>Nazwa Wojownika</label>
        <input type="text" id="displayName" required placeholder="Twoja nazwa">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="twój@email.com">
      </div>
      <div class="form-group">
        <label>Hasło (min. 6 znaków)</label>
        <input type="password" id="password" required minlength="6" placeholder="••••••••">
        <div id="error" class="error"></div>
      </div>
      <button type="submit" class="btn-primary">Dołącz do Areny ⚔</button>
    </form>

    <div class="link">
      Masz już konto? <a href="login.html">Zaloguj się</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const displayName = document.getElementById('displayName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName });
        await createUserProfile(cred.user.uid, email, displayName);
        window.location.href = 'index.html';
      } catch (err) {
        const msg = err.code === 'auth/email-already-in-use' ? 'Ten email już istnieje' : err.message;
        document.getElementById('error').textContent = msg;
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
