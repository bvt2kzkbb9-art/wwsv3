<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stwórz Bohatera - Weekend Warrior</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050505;
      --bg-dark: #0d0d0d;
      --bg-layer-2: #171717;
      --accent-red: #8b0000;
      --accent-gold: #f5d76e;
      --text-primary: #e0e0e0;
      --text-secondary: #a8a8a8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 10% 20%, rgba(139, 0, 0, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .register-container {
      background: linear-gradient(135deg, var(--bg-layer-2) 0%, var(--bg-dark) 100%);
      border: 1px solid #660000;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(139, 0, 0, 0.4), 0 20px 60px rgba(0, 0, 0, 0.9);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .register-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .register-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.7));
    }

    .register-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    .register-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f12 100%);
      border: 1px solid #660000;
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    }

    .form-select option {
      background: var(--bg-deep);
      color: var(--text-primary);
    }

    .specialization-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }

    .spec-card {
      padding: 1rem;
      background: linear-gradient(135deg, rgba(23, 23, 23, 0.9) 0%, rgba(13, 13, 13, 0.85) 100%);
      border: 2px solid #660000;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .spec-card:hover, .spec-card.selected {
      border-color: var(--accent-gold);
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.2) 0%, rgba(23, 23, 23, 0.95) 100%);
      box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
    }

    .spec-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .spec-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--accent-gold);
    }

    .btn-register {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #8b0000 0%, #b30000 100%);
      color: var(--text-primary);
      border: 1px solid #cc0000;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(139, 0, 0, 0.6);
    }

    .form-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .form-footer a {
      color: var(--accent-gold);
      text-decoration: none;
      font-weight: 700;
    }

    .error-message {
      display: none;
      background: rgba(255, 106, 0, 0.2);
      border: 1px solid #ff6b35;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #ff9f6f;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      .register-container { padding: 1.5rem; }
      .specialization-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <div class="register-icon">👤</div>
      <h1 class="register-title">STWÓRZ BOHATERA</h1>
      <p class="register-subtitle">Dołącz do Areny</p>
    </div>

    <form id="register-form">
      <div class="error-message" id="error-message"></div>

      <div class="form-group">
        <label class="form-label">Imię Bohatera</label>
        <input type="text" id="displayName" class="form-input" placeholder="Twoje imię w grze" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="twój@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Hasło (min. 6 znaków)</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" minlength="6" required>
      </div>

      <div class="form-group">
        <label class="form-label">Specjalizacja</label>
        <div class="specialization-grid">
          <div class="spec-card selected" data-spec="warrior">
            <div class="spec-icon">⚔️</div>
            <div class="spec-name">Wojownik</div>
          </div>
          <div class="spec-card" data-spec="hunter">
            <div class="spec-icon">🏹</div>
            <div class="spec-name">Łowca</div>
          </div>
          <div class="spec-card" data-spec="berserker">
            <div class="spec-icon">🗡️</div>
            <div class="spec-name">Berserker</div>
          </div>
          <div class="spec-card" data-spec="monk">
            <div class="spec-icon">🧘</div>
            <div class="spec-name">Mnich</div>
          </div>
        </div>
        <input type="hidden" id="specialization" value="warrior" required>
      </div>

      <button type="submit" class="btn-register">⚔ STWÓRZ</button>
    </form>

    <div class="form-footer">
      Masz konto? <a href="login.html">Zaloguj się</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBHwVgFJgsvOp1ZgU4nQetHM_KgzxeXzZI",
      authDomain: "weekend-warrior-social-v2.firebaseapp.com",
      projectId: "weekend-warrior-social-v2",
      storageBucket: "weekend-warrior-social-v2.firebasestorage.app",
      messagingSenderId: "147800031459",
      appId: "1:147800031459:web:d72e1fc2b81b8b152405d6"
    });

    const auth = firebase.auth();
    const db = firebase.firestore();
    const form = document.getElementById('register-form');
    const errorMsg = document.getElementById('error-message');
    const specCards = document.querySelectorAll('.spec-card');

    specCards.forEach(card => {
      card.addEventListener('click', () => {
        specCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        document.getElementById('specialization').value = card.dataset.spec;
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const displayName = document.getElementById('displayName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const specialization = document.getElementById('specialization').value;

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName });
        
        await db.collection('users').doc(cred.user.uid).set({
          uid: cred.user.uid,
          email,
          displayName,
          specialization,
          level: 1,
          xp: 0,
          rank: 'Nowicjusz',
          elo: 1200,
          createdAt: new Date(),
          lastLoginAt: new Date()
        });

        window.location.href = 'index.html';
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.classList.add('show');
      }
    });

    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
