<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Osiągnięcia - Weekend Warrior V5</title>
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚔ WEEKEND WARRIOR V5</div>
    <div class="navbar-menu">
      <a href="index.html" class="nav-item">Arena</a>
      <a href="feed.html" class="nav-item">Kroniki</a>
      <a href="ranking.html" class="nav-item">Ranking</a>
      <a href="challenges.html" class="nav-item">Misje</a>
      <a href="friends.html" class="nav-item">Znajomi</a>
      <a href="achievements.html" class="nav-item active">Osiągnięcia</a>
      <a href="profile.html" class="nav-item">Profil</a>
      <button id="logout-btn" class="nav-item">Wyloguj</button>
    </div>
  </nav>

  <main id="app" style="max-width: 900px;">
    <h1>🎖️ Moje Osiągnięcia</h1>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.5rem; margin: 2rem 0;">
      <div class="card" style="text-align: center;">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">📝</div>
        <h4 style="color: var(--gold);">Pierwszy Post</h4>
        <p style="color: var(--text-muted); font-size: 0.85rem;">+10 XP</p>
      </div>

      <div class="card" style="text-align: center; opacity: 0.5;">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">⬆️</div>
        <h4 style="color: var(--border-light);">Poziom 10</h4>
        <p style="color: var(--text-muted); font-size: 0.85rem;">🔒 Zablokowane</p>
      </div>

      <div class="card" style="text-align: center; opacity: 0.5;">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">👥</div>
        <h4 style="color: var(--border-light);">10 Przyjaciół</h4>
        <p style="color: var(--text-muted); font-size: 0.85rem;">🔒 Zablokowane</p>
      </div>

      <div class="card" style="text-align: center; opacity: 0.5;">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">⚔️</div>
        <h4 style="color: var(--border-light);">Mistrz Wojen</h4>
        <p style="color: var(--text-muted); font-size: 0.85rem;">🔒 Zablokowane</p>
      </div>

      <div class="card" style="text-align: center; opacity: 0.5;">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">👑</div>
        <h4 style="color: var(--border-light);">Legenda</h4>
        <p style="color: var(--text-muted); font-size: 0.85rem;">🔒 Zablokowane</p>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>

  <script>
    auth.onAuthStateChanged(() => {
      if (!auth.currentUser) window.location.href = 'login.html';
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });
  </script>
</body>
</html>
