<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking - Weekend Warrior</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050505;
      --bg-dark: #0d0d0d;
      --bg-layer-2: #171717;
      --accent-gold: #f5d76e;
      --accent-fire: #ff6a00;
      --text-primary: #e0e0e0;
      --text-secondary: #a8a8a8;
      --text-muted: #696969;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    main {
      padding: 2rem 1.5rem 140px;
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, var(--bg-layer-2) 0%, var(--bg-dark) 100%);
      backdrop-filter: blur(30px);
      border-bottom: 2px solid #8b0000;
      padding: 1rem 1.5rem;
      box-shadow: 0 0 50px rgba(139, 0, 0, 0.4);
    }

    .navbar-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .navbar-btn {
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, rgba(17,17,17,0.95) 0%, rgba(13,13,13,0.9) 100%);
      border: 1.5px solid #8b0000;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
      transition: all 0.3s ease;
    }

    .navbar-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid rgba(139, 0, 0, 0.2);
      padding-bottom: 1rem;
    }

    .tab-btn {
      padding: 0.8rem 1.5rem;
      background: transparent;
      border: 2px solid rgba(139, 0, 0, 0.2);
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      border-color: var(--accent-gold);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #8b0000 0%, #b30000 100%);
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .tab-content {
      display: none;
    }

    .tab-content.show {
      display: block;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 2rem;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
    }

    /* ════ TOP 3 PODIUM ════ */

    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 2rem;
      margin-bottom: 4rem;
      perspective: 1200px;
    }

    .podium-place {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      animation: podium-float 3s ease-in-out infinite;
    }

    .podium-place.second {
      animation-delay: 0.2s;
    }

    .podium-place.third {
      animation-delay: 0.4s;
    }

    @keyframes podium-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .podium-medal {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      animation: medal-bounce 2s ease-in-out infinite;
    }

    @keyframes medal-bounce {
      0%, 100% { transform: rotateY(0); }
      50% { transform: rotateY(360deg); }
    }

    .podium-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #050505;
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      margin-bottom: 1rem;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 10px 30px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
    }

    .podium-place.first .podium-circle {
      width: 100px;
      height: 100px;
      font-size: 2.5rem;
      box-shadow: 0 0 60px rgba(212, 175, 55, 0.4), 0 0 40px rgba(255, 106, 0, 0.3), 0 15px 40px rgba(0, 0, 0, 0.9);
    }

    .podium-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .podium-name {
      font-family: 'Cinzel', serif;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .podium-xp {
      font-family: 'Space Grotesk', monospace;
      color: var(--accent-gold);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .podium-crown {
      position: absolute;
      top: -15px;
      font-size: 1.5rem;
      animation: crown-bounce 1.5s ease-in-out infinite;
    }

    @keyframes crown-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* ════ TOP 100 LIST ════ */

    .ranking-list {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.5rem;
      border-bottom: 1px solid rgba(139, 0, 0, 0.1);
      transition: all 0.3s ease;
      animation: slideInLeft 0.5s ease-out backwards;
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .ranking-item:nth-child(1) { animation-delay: 0.05s; }
    .ranking-item:nth-child(2) { animation-delay: 0.1s; }
    .ranking-item:nth-child(3) { animation-delay: 0.15s; }
    .ranking-item:nth-child(4) { animation-delay: 0.2s; }
    .ranking-item:nth-child(5) { animation-delay: 0.25s; }

    .ranking-item:hover {
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.1) 0%, rgba(23, 23, 23, 0.05) 100%);
      padding-left: 2rem;
    }

    .ranking-position {
      min-width: 40px;
      font-family: 'Space Grotesk', monospace;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-gold);
      text-align: center;
    }

    .ranking-avatar {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .ranking-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ranking-info {
      flex: 1;
      min-width: 0;
    }

    .ranking-name {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
      word-break: break-word;
    }

    .ranking-status {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .ranking-stats {
      display: flex;
      gap: 1.5rem;
      justify-content: flex-end;
    }

    .stat {
      text-align: right;
    }

    .stat-label {
      font-size: 0.75rem;
      font-family: 'Space Grotesk', monospace;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 800;
      font-family: 'Space Grotesk', monospace;
      color: var(--accent-gold);
    }

    .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(139, 0, 0, 0.3);
      border-top: 3px solid var(--accent-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-ranking {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      main { padding: 1.5rem 1rem 130px; }
      .podium-container { gap: 1rem; }
      .podium-circle { width: 70px; height: 70px; font-size: 1.5rem; }
      .podium-place.first .podium-circle { width: 80px; height: 80px; font-size: 2rem; }
      .ranking-stats { gap: 1rem; }
      .tabs { flex-wrap: wrap; }
    }

    @media (max-width: 480px) {
      main { padding: 1rem; }
      .podium-container { flex-direction: column; align-items: center; }
      .ranking-item { gap: 1rem; }
      .ranking-stats { flex-direction: column; gap: 0.5rem; }
      .section-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <button class="navbar-btn" onclick="window.location.href='index.html'">← WRÓĆ</button>
      <button id="logout-btn" class="navbar-btn">Wyloguj</button>
    </div>
  </nav>

  <main>
    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('top100')">🏆 TOP 100</button>
      <button class="tab-btn" onclick="switchTab('top3')">👑 PODIUM</button>
      <button class="tab-btn" onclick="switchTab('friends')">👥 ZNAJOMI</button>
      <button class="tab-btn" onclick="switchTab('weekly')">📅 TYGODNIOWO</button>
    </div>

    <!-- TOP 100 TAB -->
    <div id="top100" class="tab-content show">
      <h1 class="section-title">🏆 TOP 100 WOJOWNIKÓW</h1>
      <div id="top100-content" class="ranking-list">
        <div class="loading">
          <div class="spinner"></div>
          <p>Ładowanie rankingu...</p>
        </div>
      </div>
    </div>

    <!-- TOP 3 TAB -->
    <div id="top3" class="tab-content">
      <h1 class="section-title">👑 SALA CHWAŁY</h1>
      <div id="top3-content" class="podium-container">
        <div class="loading">
          <div class="spinner"></div>
          <p>Ładowanie podium...</p>
        </div>
      </div>
    </div>

    <!-- FRIENDS TAB -->
    <div id="friends" class="tab-content">
      <h1 class="section-title">👥 RANKING ZNAJOMYCH</h1>
      <div id="friends-content" class="ranking-list">
        <div class="loading">
          <div class="spinner"></div>
          <p>Ładowanie rankingu znajomych...</p>
        </div>
      </div>
    </div>

    <!-- WEEKLY TAB -->
    <div id="weekly" class="tab-content">
      <h1 class="section-title">📅 RANKING TYGODNIOWY</h1>
      <div id="weekly-content" class="ranking-list">
        <div class="loading">
          <div class="spinner"></div>
          <p>Ładowanie rankingu tygodniowego...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/ranking.js"></script>

  <script>
    let currentUser = null;
    let unsubscribeTop100 = null;
    let unsubscribeTop3 = null;

    // ════════════════════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════════════════════════════════════════

    window.addEventListener('DOMContentLoaded', () => {
      console.log('📊 RANKING.HTML: Page loaded');

      // Logout handler - INSIDE DOMContentLoaded so logout-btn element exists
      document.getElementById('logout-btn').addEventListener('click', () => {
        console.log('📊 RANKING.HTML: Logout clicked');
        auth.signOut().then(() => {
          console.log('✅ RANKING.HTML: Logged out, redirecting to login.html');
          window.location.href = 'login.html';
        }).catch((error) => {
          console.error('❌ RANKING.HTML: Logout error', {
            file: 'ranking.html',
            line: 686,
            errorCode: error.code,
            errorMessage: error.message,
            stack: error.stack
          });
        });
      });

      AuthService.onAuthStateChanged((user) => {
        console.log('📊 RANKING.HTML: Auth state changed', {
          userExists: !!user,
          uid: user?.uid,
          email: user?.email
        });

        if (!user) {
          console.log('📊 RANKING.HTML: No user, redirecting to login.html');
          window.location.href = 'login.html';
          return;
        }

        console.log('✅ RANKING.HTML: User authenticated, loading rankings');
        currentUser = user;
        loadRankings();
      });
    });

    // ════════════════════════════════════════════════════════════════════════════════
    // TAB SWITCHING
    // ════════════════════════════════════════════════════════════════════════════════

    function switchTab(tabName) {
      // Hide all
      document.querySelectorAll('.tab-content').forEach((el) => {
        el.classList.remove('show');
      });

      // Remove active from buttons
      document.querySelectorAll('.tab-btn').forEach((el) => {
        el.classList.remove('active');
      });

      // Show selected
      document.getElementById(tabName).classList.add('show');
      event.target.classList.add('active');

      // Load content if needed
      if (tabName === 'top100' && !unsubscribeTop100) {
        loadTop100();
      } else if (tabName === 'top3' && !unsubscribeTop3) {
        loadTop3();
      } else if (tabName === 'friends') {
        loadFriendsRanking();
      } else if (tabName === 'weekly') {
        loadWeeklyRanking();
      }
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // LOAD RANKINGS
    // ════════════════════════════════════════════════════════════════════════════════

    function loadRankings() {
      loadTop100();
      loadTop3();
    }

    async function loadTop100() {
      unsubscribeTop100 = RankingService.listenToTop100((result) => {
        displayTop100(result);
      });
    }

    async function loadTop3() {
      unsubscribeTop3 = RankingService.listenToTop3((result) => {
        displayTop3(result);
      });
    }

    async function loadFriendsRanking() {
      const result = await RankingService.getFriendsRanking(currentUser.uid);
      displayFriendsRanking(result);
    }

    async function loadWeeklyRanking() {
      const result = await RankingService.getWeeklyRanking();
      displayRankingList('weekly-content', result);
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // DISPLAY FUNCTIONS
    // ════════════════════════════════════════════════════════════════════════════════

    function displayTop100(result) {
      const container = document.getElementById('top100-content');

      if (!result.success) {
        container.innerHTML = `<div class="empty-ranking">⚠ Błąd: ${result.error}</div>`;
        return;
      }

      if (!result.data || result.data.length === 0) {
        container.innerHTML = '<div class="empty-ranking">Brak użytkowników w rankingu</div>';
        return;
      }

      displayRankingList('top100-content', { success: true, data: result.data });
    }

    function displayTop3(result) {
      const container = document.getElementById('top3-content');

      if (!result.success) {
        container.innerHTML = `<div class="loading">⚠ Błąd: ${result.error}</div>`;
        return;
      }

      if (!result.data || result.data.length === 0) {
        container.innerHTML = '<div class="empty-ranking">Brak użytkowników</div>';
        return;
      }

      const ranking = result.data;
      const medals = ['👑', '🥇', '🥈'];
      const positions = ['first', 'second', 'third'];

      const html = ranking.map((user, index) => {
        const avatarContent = user.photoURL 
          ? `<img src="${user.photoURL}" alt="${user.displayName}">`
          : user.displayName.charAt(0).toUpperCase();

        const podium = `
          <div class="podium-place ${positions[index]}">
            <div class="podium-medal">${medals[index]}</div>
            <div class="podium-circle">${avatarContent}</div>
            <div class="podium-name">${escapeHtml(user.displayName)}</div>
            <div class="podium-xp">${formatNumber(user.totalXp)} XP</div>
            ${index === 0 ? '<div class="podium-crown">👑</div>' : ''}
          </div>
        `;

        return podium;
      }).join('');

      container.innerHTML = html;
    }

    function displayRankingList(containerId, result) {
      const container = document.getElementById(containerId);

      if (!result.success) {
        container.innerHTML = `<div class="empty-ranking">⚠ Błąd: ${result.error}</div>`;
        return;
      }

      if (!result.data || result.data.length === 0) {
        container.innerHTML = '<div class="empty-ranking">Brak danych</div>';
        return;
      }

      const html = result.data.map((user, index) => {
        const avatarContent = user.photoURL 
          ? `<img src="${user.photoURL}" alt="${user.displayName}">`
          : user.displayName.charAt(0).toUpperCase();

        const position = user.position || (index + 1);

        return `
          <div class="ranking-item">
            <div class="ranking-position">#${position}</div>
            <div class="ranking-avatar">${avatarContent}</div>
            <div class="ranking-info">
              <div class="ranking-name">${escapeHtml(user.displayName)}</div>
              <div class="ranking-status">${user.rank} - Lvl ${user.level}</div>
            </div>
            <div class="ranking-stats">
              <div class="stat">
                <div class="stat-label">XP</div>
                <div class="stat-value">${formatNumber(user.totalXp)}</div>
              </div>
              <div class="stat">
                <div class="stat-label">ELO</div>
                <div class="stat-value">${formatNumber(user.elo)}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    function displayFriendsRanking(result) {
      displayRankingList('friends-content', result);
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════════════════════════════════════

    function formatNumber(num) {
      if (!num || isNaN(num)) return '0';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    function escapeHtml(text) {
      if (!text) return 'Unknown';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // LOGOUT
    // ════════════════════════════════════════════════════════════════════════════════

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (unsubscribeTop100) unsubscribeTop100();
      if (unsubscribeTop3) unsubscribeTop3();
    });
  </script>
</body>
</html>
