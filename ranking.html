<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking - Weekend Warrior V5</title>
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚔ WEEKEND WARRIOR V5</div>
    <div class="navbar-menu">
      <a href="index.html" class="nav-item">Arena</a>
      <a href="feed.html" class="nav-item">Kroniki</a>
      <a href="ranking.html" class="nav-item active">Ranking</a>
      <a href="challenges.html" class="nav-item">Misje</a>
      <a href="friends.html" class="nav-item">Znajomi</a>
      <a href="achievements.html" class="nav-item">Osiągnięcia</a>
      <a href="profile.html" class="nav-item">Profil</a>
      <button id="logout-btn" class="nav-item">Wyloguj</button>
    </div>
  </nav>

  <main id="app" style="max-width: 900px;">
    <h1>🏆 Sala Chwały & Ranking ELO</h1>
    <p style="text-align: center; color: var(--text-muted);">Ładowanie rankingów...</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>

  <script>
    auth.onAuthStateChanged(() => {
      const app = document.getElementById('app');

      const tabs = document.createElement('div');
      tabs.className = 'tabs';
      tabs.innerHTML = `
        <button class="tab-btn active" onclick="showTab('xp')">📊 XP Ranking</button>
        <button class="tab-btn" onclick="showTab('elo')">🎮 ELO Ranking</button>
      `;
      app.appendChild(tabs);

      const container = document.createElement('div');
      container.id = 'ranking-container';
      app.appendChild(container);

      window.showTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        if (tab === 'xp') {
          listenHallOfFame((users) => {
            renderRanking(users, 'points', 'XP');
          });
        } else {
          listenELORanking((users) => {
            renderRanking(users, 'elo', 'ELO');
          });
        }
      };

      function renderRanking(users, field, label) {
        if (!users || !Array.isArray(users)) users = [];
        if (!users.length) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Brak danych</p>';
          return;
        }

        let html = '';
        users.slice(0, 100).forEach((u, i) => {
          const medals = ['🥇', '🥈', '🥉'];
          const medal = medals[i] || '#' + (i + 1);
          const value = field === 'points' ? (u.points || 0) : (u.elo || 1200);

          html += `
            <div class="ranking-entry">
              <div class="ranking-position">${medal}</div>
              <div>
                <h4>${u.displayName || 'Wojownik'}</h4>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Lvl ${u.level || 1} • ${u.rank || 'Rookie'}</p>
              </div>
              <div class="ranking-points">
                <div class="ranking-value">${value.toLocaleString('pl-PL')}</div>
                <div class="ranking-label">${label}</div>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
      }

      window.showTab('xp');
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });
  </script>
</body>
</html>
