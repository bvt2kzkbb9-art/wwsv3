<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kroniki - Weekend Warrior Social</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚔ Weekend Warrior</div>
    <div class="navbar-menu">
      <a href="index.html" class="nav-item">Arena</a>
      <a href="feed.html" class="nav-item active">Kroniki</a>
      <a href="challenges.html" class="nav-item">Misje</a>
      <a href="ranking.html" class="nav-item">Chwała</a>
      <a href="profile.html" class="nav-item">Profil</a>
      <a href="messenger.html" class="nav-item">Wiadomości</a>
      <button id="logout-btn" class="nav-item" style="border: 1px solid var(--border-light);">Wyloguj</button>
    </div>
  </nav>
  
  <main id="app" style="max-width: 600px;">
    <h1>📜 Kroniki Areny</h1>
    <p>Ładowanie...</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBHwVgFJgsvOp1ZgU4nQetHM_KgzxeXzZI",
      authDomain: "weekend-warrior-social-v2.firebaseapp.com",
      projectId: "weekend-warrior-social-v2",
      storageBucket: "weekend-warrior-social-v2.firebasestorage.app",
      messagingSenderId: "147800031459",
      appId: "1:147800031459:web:d72e1fc2b81b8b152405d6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async (user) => {
      const app = document.getElementById('app');

      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      try {
        let html = `
          <div class="card" style="margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1rem;">Dodaj Post</h3>
            <textarea id="post-content" placeholder="Co nowego w treningach?" style="width: 100%; min-height: 100px; padding: 1rem; margin-bottom: 1rem; background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-primary); border-radius: 4px;"></textarea>
            <button id="publish-btn" style="background: linear-gradient(135deg, var(--gold) 0%, #E8C547 100%); color: #000; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%;">Opublikuj</button>
          </div>

          <div id="feed-container">
            <p style="text-align: center; color: var(--text-muted);">Ładowanie postów...</p>
          </div>
        `;

        app.innerHTML = html;

        // Publish post
        document.getElementById('publish-btn').addEventListener('click', async () => {
          const content = document.getElementById('post-content').value.trim();
          if (!content) return alert('Post nie może być pusty!');

          try {
            const userSnap = await db.collection('users').doc(user.uid).get();
            const userData = userSnap.data();

            await db.collection('posts').add({
              authorId: user.uid,
              authorName: user.displayName || 'Wojownik',
              authorPhotoURL: userData?.photoURL || '',
              content,
              imageURL: '',
              likes: [],
              likesCount: 0,
              reactions: {},
              reactionsCount: 0,
              commentsCount: 0,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('post-content').value = '';
            alert('Post opublikowany! 🎉');
          } catch (err) {
            alert('Błąd: ' + err.message);
          }
        });

        // Listen to feed
        db.collection('posts')
          .orderBy('createdAt', 'desc')
          .limit(50)
          .onSnapshot((snap) => {
            const container = document.getElementById('feed-container');
            if (snap.empty) {
              container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Brak postów. Bądź pierwszy!</p>';
              return;
            }

            let html = '';
            snap.forEach(doc => {
              const post = doc.data();
              const timeAgo = formatTime(post.createdAt);
              
              html += `
                <div class="post">
                  <div class="post-header">
                    <div class="post-avatar" style="width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold;">${post.authorName[0] || 'W'}</div>
                    <div class="post-meta" style="flex: 1;">
                      <div class="post-author" style="color: var(--gold); font-weight: bold;">${post.authorName}</div>
                      <div class="post-time" style="color: var(--text-muted); font-size: 0.85rem;">${timeAgo}</div>
                    </div>
                  </div>
                  <div class="post-content" style="margin: 1rem 0;">${escapeHtml(post.content)}</div>
                  <div class="post-actions" style="display: flex; gap: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-light);">
                    <button style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;">❤️ ${post.likesCount || 0}</button>
                    <button style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;">💬 ${post.commentsCount || 0}</button>
                  </div>
                </div>
              `;
            });

            container.innerHTML = html;
          });

      } catch (err) {
        app.innerHTML = `<p style="color: #EF4444;">Błąd: ${err.message}</p>`;
      }
    });

    function formatTime(timestamp) {
      if (!timestamp) return '';
      const date = timestamp.toDate?.() || new Date(timestamp);
      const diff = Math.floor((new Date() - date) / 1000);
      if (diff < 60) return 'teraz';
      if (diff < 3600) return Math.floor(diff / 60) + 'm temu';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h temu';
      return date.toLocaleDateString('pl-PL');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => {
        window.location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
