<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kroniki - Weekend Warrior V5</title>
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚔ WEEKEND WARRIOR V5</div>
    <div class="navbar-menu">
      <a href="index.html" class="nav-item">Arena</a>
      <a href="feed.html" class="nav-item active">Kroniki</a>
      <a href="ranking.html" class="nav-item">Ranking</a>
      <a href="challenges.html" class="nav-item">Misje</a>
      <a href="friends.html" class="nav-item">Znajomi</a>
      <a href="achievements.html" class="nav-item">Osiągnięcia</a>
      <a href="profile.html" class="nav-item">Profil</a>
      <button id="logout-btn" class="nav-item">Wyloguj</button>
    </div>
  </nav>

  <main id="app">
    <h1>📜 Kroniki Areny</h1>
    <p style="text-align: center; color: var(--text-muted);">Ładowanie...</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>

  <script>
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const app = document.getElementById('app');
      const userProfile = await getUserProfile(user.uid);

      app.innerHTML = `
        <h1>📜 Kroniki Areny</h1>

        <div class="card" style="margin-bottom: 2rem;">
          <h3>Dodaj Post</h3>
          <textarea id="post-content" placeholder="Co nowego w treningach?" style="width: 100%; min-height: 100px; padding: 1rem; margin-bottom: 1rem; background: var(--bg-input); border: 1px solid var(--border-light); border-radius: 6px; color: var(--text-primary); resize: vertical;"></textarea>
          <button id="publish-btn" style="width: 100%; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #000; padding: 0.75rem; border: none; border-radius: 6px; font-weight: 700; cursor: pointer;">📝 Opublikuj Post</button>
        </div>

        <div id="feed-container">
          <p style="text-align: center; color: var(--text-muted);">Ładowanie postów...</p>
        </div>
      `;

      document.getElementById('publish-btn').addEventListener('click', async () => {
        const content = document.getElementById('post-content').value.trim();
        if (!content) return alert('Post nie może być pusty!');

        try {
          await createActivityPost(user.uid, user.displayName || 'Wojownik', userProfile?.photoURL || '', content);
          document.getElementById('post-content').value = '';
          showToast('Post opublikowany! 🎉', 'success');
        } catch (err) {
          showToast('Błąd: ' + err.message, 'error');
        }
      });

      listenFeed((posts) => {
        const container = document.getElementById('feed-container');
        if (!posts.length) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Brak postów. Bądź pierwszy!</p>';
          return;
        }

        let html = '';
        posts.forEach(post => {
          html += `
            <div class="post animate-fadeIn">
              <div class="post-header">
                <div class="post-avatar" style="background: var(--gold); display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold;">${post.authorName[0]}</div>
                <div class="post-meta">
                  <div class="post-author">${post.authorName}</div>
                  <div class="post-time">${formatTime(post.createdAt)}</div>
                </div>
              </div>
              <div class="post-content">${escapeHtml(post.content)}</div>
              <div style="display: flex; gap: 1rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-light);">
                <button style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;" onclick="window.WWS.likePost('${post.id}', '${user.uid}')">❤️ ${post.likesCount || 0}</button>
                <button style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;">💬 ${post.commentsCount || 0}</button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      });
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });
  </script>
</body>
</html>
