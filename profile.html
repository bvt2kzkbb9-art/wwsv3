<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - Weekend Warrior</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050505;
      --bg-dark: #0d0d0d;
      --bg-layer-2: #171717;
      --accent-gold: #f5d76e;
      --accent-fire: #ff6a00;
      --text-primary: #e0e0e0;
      --text-secondary: #a8a8a8;
      --text-muted: #696969;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    main {
      padding: 2rem 1.5rem 140px;
      max-width: 1000px;
      margin: 0 auto;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, var(--bg-layer-2) 0%, var(--bg-dark) 100%);
      backdrop-filter: blur(30px);
      border-bottom: 2px solid #8b0000;
      padding: 1rem 1.5rem;
      box-shadow: 0 0 50px rgba(139, 0, 0, 0.4);
    }

    .navbar-content {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .navbar-btn {
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, rgba(17,17,17,0.95) 0%, rgba(13,13,13,0.9) 100%);
      border: 1.5px solid #8b0000;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
      transition: all 0.3s ease;
    }

    .navbar-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    .profile-banner {
      height: 200px;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      border-radius: 12px;
      margin-bottom: -60px;
      position: relative;
      overflow: hidden;
      animation: bannerGlow 3s ease-in-out infinite;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-banner:hover {
      filter: brightness(1.1);
    }

    .profile-banner-upload {
      display: none;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .profile-banner:hover .banner-overlay {
      opacity: 1;
    }

    .banner-text {
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes bannerGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
      50% { box-shadow: 0 0 50px rgba(212, 175, 55, 0.5); }
    }

    .profile-card {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      padding: 2rem;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(139, 0, 0, 0.1);
    }

    .profile-header {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      align-items: flex-start;
    }

    .profile-avatar-container {
      position: relative;
      flex-shrink: 0;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 10px 30px rgba(0, 0, 0, 0.8);
      margin-top: -80px;
      border: 2px solid var(--bg-layer-2);
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-avatar:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    .avatar-upload {
      display: none;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 12px;
    }

    .profile-avatar:hover .avatar-overlay {
      opacity: 1;
    }

    .avatar-text {
      color: var(--text-primary);
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name-edit {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .profile-name {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
    }

    .edit-btn {
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, #8b0000 0%, #b30000 100%);
      border: 1px solid #cc0000;
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .edit-btn:hover {
      box-shadow: 0 0 25px rgba(139, 0, 0, 0.5);
    }

    .profile-rank {
      font-size: 0.95rem;
      font-family: 'Cinzel', serif;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-box:hover {
      border-color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .stat-label {
      font-size: 0.8rem;
      font-family: 'Space Grotesk', monospace;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Space Grotesk', monospace;
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }

    .edit-form {
      display: none;
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .edit-form.show {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input, .form-textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f12 100%);
      border: 1px solid #660000;
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }

    .char-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      text-align: right;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
    }

    .btn-save {
      flex: 1;
      padding: 0.75rem;
      background: linear-gradient(135deg, #8b0000 0%, #b30000 100%);
      color: var(--text-primary);
      border: 1px solid #cc0000;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-save:hover {
      box-shadow: 0 0 40px rgba(139, 0, 0, 0.5);
    }

    .btn-save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--bg-layer-2) 0%, var(--bg-dark) 100%);
      border: 2px solid #8b0000;
      color: var(--accent-gold);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-cancel:hover {
      border-color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .bio-display {
      padding: 1.5rem;
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .bio-empty {
      color: var(--text-muted);
      font-style: italic;
    }

    .error-message {
      display: none;
      background: rgba(255, 106, 0, 0.2);
      border: 1px solid #cc0000;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #ff9999;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      display: none;
      background: rgba(0, 102, 51, 0.2);
      border: 1px solid #00cc66;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #66ff99;
      font-size: 0.9rem;
    }

    .success-message.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      main { padding: 1.5rem 1rem 130px; }
      .profile-header { flex-direction: column; }
      .profile-avatar { width: 100px; height: 100px; font-size: 2.5rem; }
      .profile-name { font-size: 1.5rem; }
      .profile-stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      main { padding: 1rem; }
      .profile-stats { grid-template-columns: 1fr; }
      .profile-banner { height: 150px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <button class="navbar-btn" onclick="window.location.href='index.html'">← WRÓĆ</button>
      <button id="logout-btn" class="navbar-btn">Wyloguj</button>
    </div>
  </nav>

  <main>
    <div class="profile-banner" id="banner-click">
      <div class="banner-overlay">
        <div class="banner-text">📸 Zmień banner</div>
      </div>
      <input type="file" id="banner-upload" class="profile-banner-upload" accept="image/*">
    </div>

    <div class="profile-card">
      <div class="error-message" id="error-message"></div>
      <div class="success-message" id="success-message"></div>

      <div class="profile-header">
        <div class="profile-avatar-container">
          <div class="profile-avatar" id="avatar-click">
            <div id="avatar-content">⚔</div>
            <div class="avatar-overlay">
              <div class="avatar-text">📷 Avatar</div>
            </div>
          </div>
          <input type="file" id="avatar-upload" class="avatar-upload" accept="image/*">
        </div>

        <div class="profile-info">
          <div class="profile-name-edit">
            <div>
              <div class="profile-name" id="profile-name">Wojownik</div>
              <div class="profile-rank" id="profile-rank">Nowicjusz - Lvl 1</div>
            </div>
            <button class="edit-btn" onclick="toggleNickEdit()">✏️ NICK</button>
          </div>
        </div>
      </div>

      <div class="profile-stats">
        <div class="stat-box">
          <div class="stat-label">Poziom</div>
          <div class="stat-value" id="stat-level">1</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">XP</div>
          <div class="stat-value" id="stat-xp">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">ELO</div>
          <div class="stat-value" id="stat-elo">1200</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Seria</div>
          <div class="stat-value" id="stat-streak">0</div>
        </div>
      </div>

      <!-- NICK EDIT -->
      <div class="section">
        <div id="nick-edit-form" class="edit-form">
          <div class="form-group">
            <label class="form-label">Nowy Nick (3-20 znaków)</label>
            <input type="text" id="nick-input" class="form-input" placeholder="Twój nowy nick" minlength="3" maxlength="20">
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="saveNick()">✓ ZAPISZ</button>
            <button class="btn-cancel" onclick="toggleNickEdit()">✗ ANULUJ</button>
          </div>
        </div>
      </div>

      <!-- BIO EDIT -->
      <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <div class="section-title">📝 BIO</div>
          <button class="edit-btn" onclick="toggleBioEdit()">✏️ EDYTUJ</button>
        </div>

        <div id="bio-view">
          <div class="bio-display" id="bio-display">
            <div class="bio-empty">Brak biografii. Kliknij aby dodać.</div>
          </div>
        </div>

        <div id="bio-edit-form" class="edit-form">
          <div class="form-group">
            <label class="form-label">Twoja Biografia (max 500 znaków)</label>
            <textarea id="bio-input" class="form-textarea" placeholder="Napisz coś o sobie..."></textarea>
            <div class="char-count"><span id="char-count">0</span>/500</div>
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="saveBio()">✓ ZAPISZ</button>
            <button class="btn-cancel" onclick="toggleBioEdit()">✗ ANULUJ</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="profile-service.js"></script>

  <script>
    let currentUser = null;
    let profileUnsubscribe = null;

    // ════════════════════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════════════════════════════════════════

    window.addEventListener('DOMContentLoaded', () => {
      console.log('📄 PROFILE.HTML: Page loaded');
      AuthService.onAuthStateChanged(async (user) => {
        console.log('📄 PROFILE.HTML: Auth state changed', {
          userExists: !!user,
          uid: user?.uid,
          email: user?.email,
          displayName: user?.displayName
        });

        if (!user) {
          console.log('📄 PROFILE.HTML: No user, redirecting to login.html');
          window.location.href = 'login.html';
          return;
        }

        console.log('✅ PROFILE.HTML: User authenticated, loading profile');
        currentUser = user;
        loadProfile();
      });
    });

    // Logout handler
    document.getElementById('logout-btn').addEventListener('click', () => {
      console.log('📄 PROFILE.HTML: Logout clicked');
      auth.signOut().then(() => {
        console.log('✅ PROFILE.HTML: Logged out, redirecting to login.html');
        window.location.href = 'login.html';
      }).catch((error) => {
        console.error('❌ PROFILE.HTML: Logout error', {
          file: 'profile.html',
          line: 624,
          errorCode: error.code,
          errorMessage: error.message,
          stack: error.stack
        });
      });
    });

    // ════════════════════════════════════════════════════════════════════════════════
    // LOAD PROFILE
    // ════════════════════════════════════════════════════════════════════════════════

    function loadProfile() {
      if (!currentUser) return;

      profileUnsubscribe = ProfileService.listenToProfile(currentUser.uid, (result) => {
        if (!result.success) {
          showError(result.error);
          return;
        }

        const profile = result.data;
        updateProfileDisplay(profile);
      });
    }

    function updateProfileDisplay(profile) {
      // Name
      document.getElementById('profile-name').textContent = profile.displayName || 'Wojownik';
      document.getElementById('nick-input').value = profile.displayName || '';

      // Rank
      document.getElementById('profile-rank').textContent = `${profile.specialization === 'warrior' ? '⚔️' : ''} ${profile.rank} - Lvl ${profile.level}`;

      // Stats
      document.getElementById('stat-level').textContent = profile.level;
      document.getElementById('stat-xp').textContent = formatNumber(profile.xp);
      document.getElementById('stat-elo').textContent = formatNumber(profile.elo);
      document.getElementById('stat-streak').textContent = profile.loginStreak + 'd';

      // Avatar
      const avatarContent = document.getElementById('avatar-content');
      if (profile.photoURL) {
        avatarContent.innerHTML = `<img src="${profile.photoURL}" alt="Avatar">`;
      } else {
        avatarContent.innerHTML = '⚔';
      }

      // Banner
      const banner = document.getElementById('banner-click');
      if (profile.bannerURL) {
        banner.style.backgroundImage = `url('${profile.bannerURL}')`;
        banner.style.backgroundSize = 'cover';
        banner.style.backgroundPosition = 'center';
      }

      // Bio
      const bioDisplay = document.getElementById('bio-display');
      if (profile.bio && profile.bio.trim()) {
        bioDisplay.innerHTML = profile.bio;
        bioDisplay.classList.remove('bio-empty');
      } else {
        bioDisplay.innerHTML = '<div class="bio-empty">Brak biografii. Kliknij aby dodać.</div>';
      }
      document.getElementById('bio-input').value = profile.bio || '';
      updateCharCount();
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // AVATAR UPLOAD
    // ════════════════════════════════════════════════════════════════════════════════

    document.getElementById('avatar-click').addEventListener('click', () => {
      document.getElementById('avatar-upload').click();
    });

    document.getElementById('avatar-upload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      showLoading();
      const uploadResult = await ProfileService.uploadAvatar(file);

      if (uploadResult.success) {
        const updateResult = await ProfileService.updateAvatar(currentUser.uid, uploadResult.url);
        if (updateResult.success) {
          showSuccess('Avatar zaktualizowany!');
        } else {
          showError(updateResult.error);
        }
      } else {
        showError(uploadResult.error);
      }

      hideLoading();
      e.target.value = '';
    });

    // ════════════════════════════════════════════════════════════════════════════════
    // BANNER UPLOAD
    // ════════════════════════════════════════════════════════════════════════════════

    document.getElementById('banner-click').addEventListener('click', () => {
      document.getElementById('banner-upload').click();
    });

    document.getElementById('banner-upload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      showLoading();
      const uploadResult = await ProfileService.uploadBanner(file);

      if (uploadResult.success) {
        const updateResult = await ProfileService.updateBanner(currentUser.uid, uploadResult.url);
        if (updateResult.success) {
          showSuccess('Banner zaktualizowany!');
        } else {
          showError(updateResult.error);
        }
      } else {
        showError(uploadResult.error);
      }

      hideLoading();
      e.target.value = '';
    });

    // ════════════════════════════════════════════════════════════════════════════════
    // NICK EDIT
    // ════════════════════════════════════════════════════════════════════════════════

    function toggleNickEdit() {
      document.getElementById('nick-edit-form').classList.toggle('show');
    }

    async function saveNick() {
      const newNick = document.getElementById('nick-input').value.trim();

      if (!newNick) {
        showError('Nick nie może być pusty');
        return;
      }

      const btn = event.target;
      btn.disabled = true;

      const result = await ProfileService.updateNick(currentUser.uid, newNick);

      if (result.success) {
        showSuccess('Nick zaktualizowany!');
        toggleNickEdit();
      } else {
        showError(result.error);
      }

      btn.disabled = false;
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // BIO EDIT
    // ════════════════════════════════════════════════════════════════════════════════

    function toggleBioEdit() {
      document.getElementById('bio-edit-form').classList.toggle('show');
    }

    document.getElementById('bio-input').addEventListener('input', updateCharCount);

    function updateCharCount() {
      const count = document.getElementById('bio-input').value.length;
      document.getElementById('char-count').textContent = count;
    }

    async function saveBio() {
      const newBio = document.getElementById('bio-input').value;

      const btn = event.target;
      btn.disabled = true;

      const result = await ProfileService.updateBio(currentUser.uid, newBio);

      if (result.success) {
        showSuccess('Biografia zaktualizowana!');
        toggleBioEdit();
      } else {
        showError(result.error);
      }

      btn.disabled = false;
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════════════════════════════════════

    function showError(message) {
      const el = document.getElementById('error-message');
      el.textContent = '⚠ ' + message;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    function showSuccess(message) {
      const el = document.getElementById('success-message');
      el.textContent = '✅ ' + message;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    function showLoading() {
      document.body.style.opacity = '0.7';
      document.body.style.pointerEvents = 'none';
      // Auto-unlock po 10s (zabezpieczenie przed stuck state)
      window.loadingTimeout = setTimeout(() => {
        hideLoading();
      }, 10000);
    }

    function hideLoading() {
      document.body.style.opacity = '1';
      document.body.style.pointerEvents = 'auto';
      // Wyczyść timeout
      if (window.loadingTimeout) {
        clearTimeout(window.loadingTimeout);
        window.loadingTimeout = null;
      }
    }

    function formatNumber(num) {
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (profileUnsubscribe) profileUnsubscribe();
    });
  </script>
</body>
</html>
