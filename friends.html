<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Znajomi - Weekend Warrior V5</title>
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚔ WEEKEND WARRIOR V5</div>
    <div class="navbar-menu">
      <a href="index.html" class="nav-item">Arena</a>
      <a href="feed.html" class="nav-item">Kroniki</a>
      <a href="ranking.html" class="nav-item">Ranking</a>
      <a href="challenges.html" class="nav-item">Misje</a>
      <a href="friends.html" class="nav-item active">Znajomi</a>
      <a href="achievements.html" class="nav-item">Osiągnięcia</a>
      <a href="profile.html" class="nav-item">Profil</a>
      <button id="logout-btn" class="nav-item">Wyloguj</button>
    </div>
  </nav>

  <main id="app" style="max-width: 900px;">
    <h1>👥 Moi Znajomi</h1>
    
    <div class="tabs" style="margin: 2rem 0;">
      <button class="tab-btn active" onclick="showTab('friends')">👥 Znajomi (0)</button>
      <button class="tab-btn" onclick="showTab('followers')">👁️ Obserwujący (0)</button>
      <button class="tab-btn" onclick="showTab('requests')">📋 Zaproszenia (0)</button>
    </div>

    <div id="content-container">
      <p style="text-align: center; color: var(--text-muted);">Brak znajomych</p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>

  <script>
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      window.showTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        const container = document.getElementById('content-container');

        if (tab === 'friends') {
          listenFriends(user.uid, (friends) => {
            if (!friends.length) {
              container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Brak przyjaciół. Zaproś kogoś!</p>';
              return;
            }

            let html = '';
            friends.forEach(f => {
              html += `
                <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                  <div style="flex: 1;">
                    <h4 style="margin: 0; color: var(--text-primary);">Przyjaciel #${f.friendId.slice(0, 8)}</h4>
                  </div>
                  <button style="background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #000; padding: 0.5rem 1rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">Wiadomość</button>
                </div>
              `;
            });
            container.innerHTML = html;
          });
        }
      };

      window.showTab('friends');
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });
  </script>
</body>
</html>
