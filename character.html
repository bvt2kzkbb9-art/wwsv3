<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karta Bohatera - Weekend Warrior</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050505;
      --bg-dark: #0d0d0d;
      --bg-layer-2: #171717;
      --accent-gold: #f5d76e;
      --accent-fire: #ff6a00;
      --text-primary: #e0e0e0;
      --text-secondary: #a8a8a8;
      --text-muted: #696969;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    main {
      padding: 2rem 1.5rem 140px;
      max-width: 1000px;
      margin: 0 auto;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, var(--bg-layer-2) 0%, var(--bg-dark) 100%);
      backdrop-filter: blur(30px);
      border-bottom: 2px solid #8b0000;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 50px rgba(139, 0, 0, 0.4);
    }

    .navbar-btn {
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, rgba(17,17,17,0.95) 0%, rgba(13,13,13,0.9) 100%);
      border: 1.5px solid #8b0000;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .navbar-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    .character-banner {
      height: 200px;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      border-radius: 12px;
      margin-bottom: -60px;
      position: relative;
      overflow: hidden;
      animation: bannerGlow 3s ease-in-out infinite;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
    }

    @keyframes bannerGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
      50% { box-shadow: 0 0 50px rgba(212, 175, 55, 0.5); }
    }

    .character-card {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      padding: 2rem;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(139, 0, 0, 0.1);
    }

    .character-header {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      align-items: flex-start;
    }

    .character-avatar {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      flex-shrink: 0;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 10px 30px rgba(0, 0, 0, 0.8);
      margin-top: -80px;
      border: 2px solid var(--bg-layer-2);
    }

    .character-info {
      flex: 1;
    }

    .character-name {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
    }

    .character-rank {
      font-size: 0.95rem;
      font-family: 'Cinzel', serif;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .character-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-box:hover {
      border-color: var(--accent-gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .stat-label {
      font-size: 0.8rem;
      font-family: 'Space Grotesk', monospace;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Space Grotesk', monospace;
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
    }

    .specialization {
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.1) 0%, rgba(255, 106, 0, 0.05) 100%);
      border: 1px solid var(--accent-fire);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .specialization-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .specialization-title {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent-fire);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .specialization-bonus {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .xp-section {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .xp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .xp-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
    }

    .xp-current {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-gold) 0%, var(--accent-fire) 100%);
      width: 65%;
      transition: width 0.5s ease;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
    }

    .achievements-section {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(13, 13, 13, 0.9) 100%);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 1rem;
    }

    .achievement {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(139, 0, 0, 0.2);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.6;
    }

    .achievement.unlocked {
      opacity: 1;
      border-color: var(--accent-gold);
      background: rgba(212, 175, 55, 0.1);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .achievement:hover {
      transform: scale(1.05);
    }

    .achievement-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .achievement-name {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
    }

    .achievement.unlocked .achievement-name {
      color: var(--accent-gold);
    }

    @media (max-width: 768px) {
      main { padding: 1.5rem 1rem 130px; }
      .character-header { flex-direction: column; }
      .character-avatar { width: 100px; height: 100px; font-size: 2.5rem; }
      .character-name { font-size: 1.5rem; }
      .character-stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      main { padding: 1rem; }
      .character-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <button class="navbar-btn" onclick="window.location.href='index.html'">← WRÓĆ</button>
    <button id="logout-btn" class="navbar-btn">Wyloguj</button>
  </nav>

  <main>
    <div class="character-banner"></div>
    
    <div class="character-card">
      <div class="character-header">
        <div class="character-avatar">⚔</div>
        <div class="character-info">
          <h1 class="character-name">TwojStaryKarabin</h1>
          <p class="character-rank">Wojownik - Legenda Areny</p>
        </div>
      </div>

      <div class="character-stats">
        <div class="stat-box">
          <div class="stat-label">Poziom</div>
          <div class="stat-value">25</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">XP</div>
          <div class="stat-value">12.5K</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">ELO</div>
          <div class="stat-value">1.8K</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Seria</div>
          <div class="stat-value">7D</div>
        </div>
      </div>

      <div class="specialization">
        <div class="specialization-icon">⚔️</div>
        <div class="specialization-title">Wojownik</div>
        <div class="specialization-bonus">+20% Obrażeń | +15% Ochrony</div>
      </div>

      <div class="xp-section">
        <div class="xp-header">
          <div class="xp-title">Doświadczenie</div>
          <div class="xp-current">Level 26: 12,500 / 13,000 XP</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 96%;"></div>
        </div>
      </div>

      <div class="achievements-section">
        <h2 class="section-title">🏆 Osiągnięcia</h2>
        <div class="achievements-grid">
          <div class="achievement unlocked">
            <div class="achievement-icon">📝</div>
            <div class="achievement-name">Start</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">⚔️</div>
            <div class="achievement-name">Wojownik</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">🏆</div>
            <div class="achievement-name">Champion</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">👑</div>
            <div class="achievement-name">Legenda</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">🔥</div>
            <div class="achievement-name">7 Seria</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">💪</div>
            <div class="achievement-name">100 Wojen</div>
          </div>
          <div class="achievement">
            <div class="achievement-icon">⭐</div>
            <div class="achievement-name">Secret</div>
          </div>
          <div class="achievement">
            <div class="achievement-icon">🎖️</div>
            <div class="achievement-name">Mystery</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      console.log('👤 CHARACTER.HTML: Page loaded');

      // ════════════════════════════════════════════════════════════════════════════════
      // LOGOUT
      // ════════════════════════════════════════════════════════════════════════════════

      document.getElementById('logout-btn').addEventListener('click', () => {
        console.log('👤 CHARACTER.HTML: Logout clicked');
        auth.signOut().then(() => {
          console.log('✅ CHARACTER.HTML: Logged out, redirecting to login.html');
          window.location.href = 'login.html';
        }).catch((error) => {
          console.error('❌ CHARACTER.HTML: Logout error', {
            file: 'character.html',
            line: 444,
            errorCode: error.code,
            errorMessage: error.message,
            stack: error.stack
          });
        });
      });

      AuthService.onAuthStateChanged((user) => {
        console.log('👤 CHARACTER.HTML: Auth state changed', {
          userExists: !!user,
          uid: user?.uid,
          email: user?.email
        });

        if (!user) {
          console.log('👤 CHARACTER.HTML: No user, redirecting to login.html');
          window.location.href = 'login.html';
        } else {
          console.log('✅ CHARACTER.HTML: User authenticated');
        }
      });
    });
  </script>
</body>
</html>
