<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie - Weekend Warrior V5</title>
  <link rel="stylesheet" href="css/premium.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-container { max-width: 400px; width: 100%; background: linear-gradient(135deg, rgba(31,29,26,0.95) 0%, rgba(21,18,16,0.9) 100%); border: 2px solid var(--gold); border-radius: 12px; padding: 2rem; box-shadow: 0 8px 32px rgba(212,175,55,0.2); }
    .auth-container h1 { text-align: center; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600; }
    .form-group input { width: 100%; padding: 0.75rem; background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-primary); border-radius: 6px; }
    .form-group input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.4); }
    .btn-primary { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-bottom: 1rem; }
    .error { color: #EF4444; font-size: 0.85rem; margin-top: 0.5rem; }
    .link { text-align: center; color: var(--text-muted); margin-top: 1.5rem; }
    .link a { color: var(--gold); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1>⚔ Logowanie</h1>
    
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="twój@email.com">
      </div>
      <div class="form-group">
        <label>Hasło</label>
        <input type="password" id="password" required placeholder="••••••••">
        <div id="error" class="error"></div>
      </div>
      <button type="submit" class="btn-primary">Zaloguj się ⚔</button>
    </form>

    <button id="google-btn" style="width: 100%; padding: 0.75rem; background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-primary); border-radius: 6px; cursor: pointer; margin-bottom: 1rem;">🔵 Google Login</button>

    <div class="link">
      Nie masz konta? <a href="register.html">Zarejestruj się</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'index.html';
      } catch (err) {
        document.getElementById('error').textContent = 'Zły email lub hasło';
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
        window.location.href = 'index.html';
      } catch (err) {
        alert('Błąd: ' + err.message);
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
