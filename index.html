<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekend Warrior Social V5 Premium</title>
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚔ WEEKEND WARRIOR V5</div>
    <div class="navbar-menu">
      <a href="#arena" class="nav-item active">Arena</a>
      <a href="#feed" class="nav-item">Kroniki</a>
      <a href="#ranking" class="nav-item">Ranking</a>
      <a href="#challenges" class="nav-item">Misje</a>
      <a href="#friends" class="nav-item">Znajomi</a>
      <a href="#achievements" class="nav-item">Osiągnięcia</a>
      <a href="#profile" class="nav-item">Profil</a>
      <button id="logout-btn" class="nav-item" style="border: 1px solid var(--border-light);">Wyloguj</button>
    </div>
  </nav>

  <main id="app">
    <h1>🏰 Arena Wojowników</h1>
    <p style="text-align: center; color: var(--text-muted); font-size: 1.1rem;">Ładowanie...</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBHwVgFJgsvOp1ZgU4nQetHM_KgzxeXzZI",
      authDomain: "weekend-warrior-social-v2.firebaseapp.com",
      projectId: "weekend-warrior-social-v2",
      storageBucket: "weekend-warrior-social-v2.firebasestorage.app",
      messagingSenderId: "147800031459",
      appId: "1:147800031459:web:d72e1fc2b81b8b152405d6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // MOCK TOP USERS (Until Firestore is fixed)
    const MOCK_TOP_USERS = [
      { rank: 1, displayName: 'Wojownik Legendy', level: 25, rank: 'Legend', points: 15000, photoURL: '' },
      { rank: 2, displayName: 'Champion Arena', level: 22, rank: 'Champion', points: 12000, photoURL: '' },
      { rank: 3, displayName: 'Mistrz Wojen', level: 20, rank: 'Champion', points: 10500, photoURL: '' },
      { rank: 4, displayName: 'Strażnik Areny', level: 18, rank: 'Warrior', points: 9000, photoURL: '' },
      { rank: 5, displayName: 'Mysliwiec Potworów', level: 17, rank: 'Warrior', points: 8500, photoURL: '' },
      { rank: 6, displayName: 'Łęcznik Nocny', level: 16, rank: 'Warrior', points: 8000, photoURL: '' },
      { rank: 7, displayName: 'Rycerz Światła', level: 15, rank: 'Warrior', points: 7500, photoURL: '' },
      { rank: 8, displayName: 'Ognisty Duch', level: 14, rank: 'Warrior', points: 7000, photoURL: '' },
      { rank: 9, displayName: 'Szara Sowa', level: 13, rank: 'Warrior', points: 6500, photoURL: '' },
      { rank: 10, displayName: 'Mroczny Skoczek', level: 12, rank: 'Warrior', points: 6000, photoURL: '' }
    ];

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const app = document.getElementById('app');
      
      console.log('✅ User authenticated:', user.displayName);

      try {
        // Try real Firestore first, fallback to mock if error
        let userStats = null;
        let topUsers = MOCK_TOP_USERS;

        try {
          const userSnap = await db.collection('users').doc(user.uid).get();
          if (userSnap.exists) {
            userStats = userSnap.data();
          }
        } catch (err) {
          console.warn('⚠️ Firestore read error, using mock data:', err);
        }

        // If no user stats, create mock
        if (!userStats) {
          userStats = {
            level: 1,
            rank: 'Rookie',
            points: 0,
            loginStreak: 1,
            totalFriends: 0,
            totalFollowers: 0
          };
        }

        // Get real top users if possible
        try {
          const topSnap = await db.collection('users').orderBy('points', 'desc').limit(10).get();
          if (topSnap.size > 0) {
            topUsers = [];
            topSnap.forEach((doc, i) => {
              topUsers.push({
                rank: i + 1,
                id: doc.id,
                ...doc.data()
              });
            });
          }
        } catch (err) {
          console.warn('⚠️ Firestore ranking error, using mock data:', err);
        }

        let html = `
          <div style="margin: 2rem 0;">
            <div class="card" style="text-align: center; margin-bottom: 2rem; border: 2px solid var(--gold); padding: 2rem;">
              <h2 style="margin-bottom: 1rem; color: var(--gold);">🏆 Witaj, ${user.displayName}!</h2>
              <p style="color: var(--text-muted); font-size: 1.05rem;">Polska społeczność fitness wojowników</p>
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; margin-top: 1.5rem;">
                <div><span style="color: var(--gold); font-size: 1.5rem; font-weight: 900;">${userStats.level || 1}</span><div style="color: var(--text-muted); font-size: 0.85rem;">Lvl</div></div>
                <div><span style="color: var(--gold); font-size: 1.5rem; font-weight: 900;">${(userStats.points || 0).toLocaleString('pl-PL')}</span><div style="color: var(--text-muted); font-size: 0.85rem;">XP</div></div>
                <div><span style="color: var(--gold); font-size: 1.5rem; font-weight: 900;">${userStats.loginStreak || 1}</span><div style="color: var(--text-muted); font-size: 0.85rem;">Seria</div></div>
                <div><span style="color: var(--gold); font-size: 1.5rem; font-weight: 900;">${userStats.totalFriends || 0}</span><div style="color: var(--text-muted); font-size: 0.85rem;">Znajomi</div></div>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
              <div class="card" style="text-align: center; cursor: pointer; border-bottom: 3px solid var(--gold);" onclick="window.location.href='feed.html'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">📝</div>
                <h3 style="margin: 0;">Kroniki</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Posty i aktywność</p>
              </div>

              <div class="card" style="text-align: center; cursor: pointer; border-bottom: 3px solid var(--gold);" onclick="window.location.href='challenges.html'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">⚔️</div>
                <h3 style="margin: 0;">Misje</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Wyzwania &amp; Wojny</p>
              </div>

              <div class="card" style="text-align: center; cursor: pointer; border-bottom: 3px solid var(--gold);" onclick="window.location.href='ranking.html'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">🏆</div>
                <h3 style="margin: 0;">Ranking</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">ELO &amp; Sala Chwały</p>
              </div>

              <div class="card" style="text-align: center; cursor: pointer; border-bottom: 3px solid var(--gold);" onclick="window.location.href='friends.html'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">👥</div>
                <h3 style="margin: 0;">Znajomi</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Sieć społeczna</p>
              </div>

              <div class="card" style="text-align: center; cursor: pointer; border-bottom: 3px solid var(--gold);" onclick="window.location.href='achievements.html'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">🎖️</div>
                <h3 style="margin: 0;">Osiągnięcia</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Odznaki &amp; nagrody</p>
              </div>

              <div class="card" style="text-align: center; cursor: pointer; border-bottom: 3px solid var(--gold);" onclick="window.location.href='profile.html'">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">👤</div>
                <h3 style="margin: 0;">Profil</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">Twoje dane</p>
              </div>
            </div>

            ${topUsers.length > 0 ? `
              <div class="card">
                <h2 style="margin-bottom: 1.5rem;">🥇 TOP 10 WOJOWNIKÓW</h2>
                ${topUsers.slice(0, 10).map((u, i) => {
                  const medals = ['🥇', '🥈', '🥉'];
                  const medal = medals[i] || '🏆';
                  return `
                    <div class="ranking-entry">
                      <div class="ranking-position">${medal}</div>
                      <div>
                        <h4 style="margin: 0; color: var(--text-primary);">${u.displayName || 'Wojownik'}</h4>
                        <p style="margin: 0.25rem 0 0 0; color: var(--text-muted); font-size: 0.85rem;">Lvl ${u.level || 1} • ${u.rank || 'Rookie'}</p>
                      </div>
                      <div class="ranking-points">
                        <div class="ranking-value">${(u.points || 0).toLocaleString('pl-PL')}</div>
                        <div class="ranking-label">XP</div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : ''}
          </div>
        `;

        app.innerHTML = html;
        console.log('✅ Arena rendered successfully');

      } catch (err) {
        console.error('❌ Render error:', err);
        app.innerHTML = `<p style="color: #EF4444;">❌ Błąd: ${err.message}</p><p style="color: var(--text-muted);">Spróbuj odświeżyć stronę (F5)</p>`;
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => {
        window.location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
