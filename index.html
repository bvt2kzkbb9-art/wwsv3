<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Weekend Warrior Social - Polish fitness social platform">
  <title>Arena Wojowników</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0B0D12">
  <meta name="background-color" content="#0B0D12">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">⚔ Weekend Warrior</div>
    <div class="navbar-menu">
      <a href="index.html" class="nav-item active">Arena</a>
      <a href="feed.html" class="nav-item">Kroniki</a>
      <a href="challenges.html" class="nav-item">Misje</a>
      <a href="ranking.html" class="nav-item">Chwała</a>
      <a href="profile.html" class="nav-item">Profil</a>
      <a href="messenger.html" class="nav-item">Wiadomości</a>
      <button id="logout-btn" class="nav-item" style="border: 1px solid var(--border-light);">Wyloguj</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="app">
    <h1>⚔ Arena Wojowników</h1>
    <p>Ładowanie...</p>
  </main>

  <!-- INITIALIZATION SCRIPT -->
  <script type="module">
    import { onAuthChange, logout } from './js/auth.js';
    import { initArena } from './js/index.js';
    
    onAuthChange(user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      initArena(user);
    });
    
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
